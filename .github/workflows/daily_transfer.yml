name: Daily Zeit Transfer

on:
  schedule:
    # Run at 06:00 UTC and 18:00 UTC (19:00 CET) every day
    - cron: '0 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-transfer:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up Chrome + ChromeDriver
      id: setup-chrome
      uses: browser-actions/setup-chrome@v2
      with:
        # Installs a matched Chrome + ChromeDriver pair from a single source,
        # avoiding the version mismatch between detected driver and launched browser.
        chrome-version: stable
        install-chromedriver: true
        install-dependencies: true

    - name: Install xvfb
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: Run Transfer Script
      env:
        ZEIT_USER: ${{ secrets.ZEIT_USER }}
        ZEIT_PASSWORD: ${{ secrets.ZEIT_PASSWORD }}
        ZEIT_LOGIN_URL: ${{ secrets.ZEIT_LOGIN_URL }}
        ZEIT_DOWNLOAD_URL: ${{ secrets.ZEIT_DOWNLOAD_URL }}
        TOLINO_USER: ${{ secrets.TOLINO_USER }}
        TOLINO_PASSWORD: ${{ secrets.TOLINO_PASSWORD }}
        CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        CHROMEDRIVER_BIN: ${{ steps.setup-chrome.outputs.chromedriver-path }}
      run: |
        xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" python -m src.main

    - name: Commit History
      if: success()
      run: |
        if [ -f download_history.json ]; then
            git config --global user.name 'GitHub Action'
            git config --global user.email 'action@github.com'
            # Add file (no force needed)
            git add download_history.json
            git diff --quiet && git diff --staged --quiet || (git commit -m "Update download history [skip ci]" && git push)
        else
            echo "No history file found to commit."
        fi
    - name: Upload Screenshots on Failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: screenshots
        path: "*.png"
        retention-days: 5
